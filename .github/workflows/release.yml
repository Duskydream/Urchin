name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Collect portable exe
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = Join-Path $PWD 'release-portable'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          $exe = Get-ChildItem -Path 'src-tauri/target/release' -Filter '*.exe' -File |
            Where-Object { $_.Name -notmatch 'deps|build' } |
            Select-Object -First 1

          if (-not $exe) {
            throw 'No executable found under src-tauri/target/release'
          }

          Copy-Item -LiteralPath $exe.FullName -Destination (Join-Path $stage 'urchin.exe')

          $readme = @'
          urchin Windows portable build

          Run urchin.exe to start the app.
          If Windows SmartScreen blocks it, choose "More info" and "Run anyway".
          '@
          Set-Content -LiteralPath (Join-Path $stage 'README.txt') -Value $readme -Encoding UTF8

          Compress-Archive -Path "$stage/*" -DestinationPath 'urchin-windows-x64-portable.zip' -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: urchin-windows-x64-portable
          path: urchin-windows-x64-portable.zip

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: urchin ${{ steps.release_tag.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            urchin-windows-x64-portable.zip
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
